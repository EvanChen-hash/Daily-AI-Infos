<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily AI Info Station</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="main">
        <header class="topbar">
          <div>
            <div class="headline-row">
              <h2>AI signals by date</h2>
            </div>
          </div>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-toggle-knob"></span>
            </span>
            <span class="theme-toggle-label">Light</span>
          </button>
        </header>

        <section class="controls" aria-label="Filters">
          <div id="categoryFilters" class="segmented"></div>
          <div class="filter-row">
            <div id="sourceFilters" class="source-filters"></div>
            <label class="search-box">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="" />
            </label>
            <button id="resetButton" class="ghost-button" type="button">Reset</button>
          </div>
        </section>

        <section class="content-grid">
          <aside id="dateList" class="timeline-rail" aria-label="Date navigation"></aside>
          <div class="feed-column">
            <span id="visibleCount" class="visible-count">0 visible</span>
            <div id="feed" class="feed"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
